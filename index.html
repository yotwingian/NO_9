<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studieplatformen — NP Åk 9</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0a0c10;
  --card: #111318;
  --card2: #171b22;
  --border: #1e2330;
  --border2: #272f42;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.hero {
  padding: 3.5rem 1.5rem 2.5rem; text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1020 0%, var(--bg) 100%);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 88%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 8%  55%, rgba(255,255,255,0.2) 0%, transparent 100%);
}
.hero-tag { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.hero h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; line-height: 1.15; margin-bottom: 0.6rem; }
.hero h1 .grad { background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero p { font-size: 0.88rem; color: var(--muted); max-width: 460px; margin: 0 auto 2rem; line-height: 1.6; }

.overall-progress {
  display: inline-flex; align-items: center; gap: 1rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; padding: 0.5rem 1.2rem 0.5rem 0.8rem;
}
.op-bar-bg { width: 120px; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.op-bar-fg { height: 100%; background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
.op-text { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

.subject-tabs {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 1.2rem 1.5rem; max-width: 980px; margin: 0 auto;
  overflow-x: auto; scrollbar-width: none;
}
.subject-tabs::-webkit-scrollbar { display: none; }

.subject-btn {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
  padding: 0.55rem 1.1rem; border-radius: 100px;
  border: 1px solid var(--border2); background: var(--card); color: var(--muted);
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.subject-btn:hover { color: var(--text); border-color: #3a4562; }
.subject-btn.active { color: var(--text); border-color: var(--sb-color); background: color-mix(in srgb, var(--sb-color) 10%, transparent); }
.subject-btn .sb-count { font-family: var(--mono); font-size: 0.62rem; background: var(--border2); padding: 0.1rem 0.4rem; border-radius: 8px; }
.subject-btn.active .sb-count { background: color-mix(in srgb, var(--sb-color) 20%, transparent); color: var(--sb-color); }
.subject-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.grid-wrap { max-width: 980px; margin: 0 auto; padding: 0 1.5rem 4rem; }
.subject-section { display: none; }
.subject-section.active { display: block; }
.grid-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; padding-top: 0.5rem; }
.chapters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem; }

.ch-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.4rem;
  text-decoration: none; color: var(--text); display: block;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  position: relative; overflow: hidden;
}
.ch-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: 16px 16px 0 0;
  background: var(--cc); opacity: 0.8;
}
.ch-card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 8px 32px color-mix(in srgb, var(--cc) 12%, transparent); }
.ch-card.coming { opacity: 0.4; pointer-events: none; background: repeating-linear-gradient(45deg, var(--card), var(--card) 10px, var(--card2) 10px, var(--card2) 20px); }
.ch-card.coming::after { content: 'KOMMER SNART'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); background: rgba(10,12,16,0.7); border-radius: 16px; }
.ch-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.8rem; }
.ch-icon { font-size: 1.8rem; line-height: 1; }
.ch-num { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); background: var(--card2); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid var(--border2); }
.ch-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; color: var(--cc); }
.ch-sub { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.1rem; }
.ch-stats { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.ch-stat { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); background: var(--card2); border: 1px solid var(--border2); padding: 0.18rem 0.5rem; border-radius: 4px; }
.ch-progress-wrap { display: flex; align-items: center; gap: 0.7rem; }
.ch-bar-bg { flex: 1; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.ch-bar-fg { height: 100%; border-radius: 3px; background: var(--cc); transition: width 0.4s ease; opacity: 0.8; }
.ch-pct { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); min-width: 2.5rem; text-align: right; }
.ch-done-badge { display: none; position: absolute; top: 1rem; right: 1rem; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; font-family: var(--mono); font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
.ch-card.complete .ch-done-badge { display: block; }

.reset-wrap { text-align: center; padding: 1rem 0 2rem; }
.reset-all-btn { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; padding: 0.5rem 1.2rem; border: 1px solid var(--border2); background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.reset-all-btn:hover { color: #ef4444; border-color: #ef4444; }
.footer { text-align: center; padding: 1.5rem; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }

@media (max-width: 600px) {
  .hero { padding: 2.5rem 1rem 2rem; }
  .grid-wrap { padding: 0 1rem 3rem; }
  .chapters-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Nationella Provet · Åk 9</div>
  <h1><span class="grad">Studieplatformen</span></h1>
  <p>Välj ämne och kapitel. Flashkort, förståelsequiz, resonemang och riktiga NP-frågor.</p>
  <div class="overall-progress">
    <div class="op-bar-bg"><div class="op-bar-fg" id="overallBar"></div></div>
    <span class="op-text" id="overallText">Laddar…</span>
  </div>
</div>

<div class="subject-tabs" id="subjectTabs"></div>
<div class="grid-wrap" id="gridWrap"></div>
<div class="footer">Studieplatformen · Nationella Prov åk 9 · Lycka till! 🌟</div>

<script>
// ═══════════════════════════════════════════════════════════
//  SUBJECTS CONFIG
//  Lägg till ett nytt ämne = lägg till ett objekt i listan.
//  Lägg till ett kapitel = lägg till ett objekt i chapters[].
//  Inget annat i filen behöver ändras.
// ═══════════════════════════════════════════════════════════
const SUBJECTS = [
  {
    id: 'fysik',
    label: 'Fysik',
    icon: '⚗️',
    color: '#60a5fa',
    chapters: [
      { id: 'el',        num: 1,  icon: '⚡', color: '#3a8eff', title: 'Elektricitet & Magnetism', sub: 'Ohms lag · Kretsar · Serie & Parallell · Transformator · Generator',        file: 'fysik_el_magnetism.html' },
      { id: 'kraft',     num: 2,  icon: '🚀', color: '#06d6a0', title: 'Kraft & Rörelse',          sub: 'Newtons lagar · Hastighet · Friktion · Tyngdpunkt · Kaströrelse',            file: 'fysik_kraft_rorelse.html' },
      { id: 'materia',   num: 3,  icon: '🔥', color: '#ff6b35', title: 'Materia & Värme',          sub: 'Atom · Aggregationstillstånd · Densitet · Värmeöverföring · Temperatur',     file: 'fysik_materia_varme.html' },
      { id: 'tryck',     num: 4,  icon: '🌊', color: '#3a8eff', title: 'Tryck',                    sub: 'Arkimedes · Lyftkraft · Lufttryck · Densitet · Övertryck & Undertryck',      file: 'fysik_tryck.html' },
      { id: 'arbete',    num: 5,  icon: '⚙️', color: '#a259ff', title: 'Arbete, Energi & Effekt', sub: 'Enkla maskiner · Hävstång · Lutande plan · Effektlagen · Rörelseenergi',     file: 'fysik_arbete_energi.html' },
      { id: 'ljud',      num: 6,  icon: '🔊', color: '#00e5ff', title: 'Ljud & Ljus',             sub: 'Frekvens · Decibel · Reflektion · Brytning · Linser · EM-spektrum',          file: 'fysik_ljud_ljus.html' },
      { id: 'karn',      num: 7,  icon: '⚛️', color: '#f97316', title: 'Kärnfysik',               sub: 'Radioaktivitet · α β γ · Halveringstid · Fission & Fusion · E=mc²',          file: 'fysik_karnfysik.html' },
      { id: 'universum', num: 8,  icon: '🌌', color: '#a855f7', title: 'Universum',               sub: 'Solsystemet · Rymdobjekt · Stjärnors liv · Big Bang · Ljusår',               file: 'fysik_universum.html' },
      { id: 'energi',    num: 9,  icon: '🌿', color: '#22c55e', title: 'Energiförsörjning',       sub: 'Energiformer · Energiprincipen · Förnybart · Fossilt · Miljökonsekvenser',   file: 'fysik_energiforsorjning.html' },
    ]
  },
  {
    id: 'kemi',
    label: 'Kemi',
    icon: '🧪',
    color: '#f97316',
    comingSoon: true,   // sätt till false när kapitelfilerna är klara
    chapters: [
      { id: 'periodiska', num: 1, icon: '📊', color: '#f97316', title: 'Periodiska systemet',  sub: 'Grundämnen · Perioder · Grupper · Metaller & Ickemetaller', file: '' },
      { id: 'bindningar', num: 2, icon: '🔗', color: '#fb923c', title: 'Kemiska bindningar',   sub: 'Joner · Kovalenta bindningar · Molekyler · Poläritet',       file: '' },
      { id: 'syror',      num: 3, icon: '⚗️', color: '#fbbf24', title: 'Syror & Baser',        sub: 'pH · Neutralisering · Indikatorer · Buffersystem',            file: '' },
      { id: 'organisk',   num: 4, icon: '🌿', color: '#a3e635', title: 'Organisk kemi',        sub: 'Kolföreningar · Alkaner · Alkener · Funktionella grupper',    file: '' },
    ]
  },
  {
    id: 'biologi',
    label: 'Biologi',
    icon: '🧬',
    color: '#34d399',
    comingSoon: true,
    chapters: [
      { id: 'cellen',    num: 1, icon: '🔬', color: '#34d399', title: 'Cellen',     sub: 'Cellstruktur · Organeller · Celldelning · DNA',                 file: '' },
      { id: 'evolution', num: 2, icon: '🦕', color: '#2dd4bf', title: 'Evolution',  sub: 'Naturligt urval · Adaptation · Artbildning · Fossil',           file: '' },
      { id: 'ekologi',   num: 3, icon: '🌳', color: '#86efac', title: 'Ekologi',    sub: 'Ekosystem · Näringsnät · Kretslopp · Biologisk mångfald',       file: '' },
    ]
  },
];

// ═══════════════════════════════════════════════════════════
//  RENDERING  (inget behöver ändras nedan)
// ═══════════════════════════════════════════════════════════
let activeSubject = SUBJECTS[0].id;

function buildUI() {
  buildTabs();
  buildGrids();
  loadAllProgress();
}

function buildTabs() {
  const wrap = document.getElementById('subjectTabs');
  wrap.innerHTML = '';
  SUBJECTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'subject-btn' + (s.id === activeSubject ? ' active' : '');
    btn.style.setProperty('--sb-color', s.color);
    btn.dataset.sid = s.id;
    btn.innerHTML = `<span>${s.icon}</span>${s.label}<span class="sb-count">${s.chapters.length}</span>`;
    if (s.comingSoon) {
      btn.disabled = true;
      btn.title = 'Kommer snart';
    } else {
      btn.onclick = () => switchSubject(s.id);
    }
    wrap.appendChild(btn);
  });
}

function switchSubject(id) {
  activeSubject = id;
  document.querySelectorAll('.subject-btn').forEach(b => b.classList.toggle('active', b.dataset.sid === id));
  document.querySelectorAll('.subject-section').forEach(s => s.classList.toggle('active', s.dataset.sid === id));
}

function buildGrids() {
  const wrap = document.getElementById('gridWrap');
  wrap.innerHTML = '';
  SUBJECTS.forEach(subject => {
    const section = document.createElement('div');
    section.className = 'subject-section' + (subject.id === activeSubject ? ' active' : '');
    section.dataset.sid = subject.id;

    const label = document.createElement('div');
    label.className = 'grid-label';
    label.textContent = subject.icon + '  ' + subject.label + ' — välj ett kapitel';
    section.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'chapters-grid';

    subject.chapters.forEach(ch => {
      const isLocked = subject.comingSoon || !ch.file;
      const el = document.createElement(isLocked ? 'div' : 'a');
      el.className = 'ch-card' + (isLocked ? ' coming' : '');
      el.style.setProperty('--cc', ch.color || subject.color);
      if (!isLocked) {
        el.href = ch.file;
        el.dataset.storageKey = ch.file.replace('.html', '');
      }
      el.innerHTML = `
        <div class="ch-done-badge">✓ KLAR</div>
        <div class="ch-top">
          <div class="ch-icon">${ch.icon}</div>
          <span class="ch-num">Kap ${ch.num}</span>
        </div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-sub">${ch.sub}</div>
        <div class="ch-stats">
          <span class="ch-stat">🃏 Begrepp</span>
          <span class="ch-stat">💡 Förståelse</span>
          <span class="ch-stat">🧠 Resonemang</span>
          <span class="ch-stat">📋 NP-frågor</span>
        </div>
        <div class="ch-progress-wrap">
          <div class="ch-bar-bg">
            <div class="ch-bar-fg" id="bar-${subject.id}-${ch.id}" style="width:0%"></div>
          </div>
          <span class="ch-pct" id="pct-${subject.id}-${ch.id}">—</span>
        </div>`;
      grid.appendChild(el);
    });

    section.appendChild(grid);
    wrap.appendChild(section);
  });

  const resetWrap = document.createElement('div');
  resetWrap.className = 'reset-wrap';
  resetWrap.innerHTML = `<button class="reset-all-btn" onclick="resetAll()">↺ Nollställ all progress</button>`;
  wrap.appendChild(resetWrap);
}

function loadAllProgress() {
  let totalPct = 0, totalCh = 0, doneCh = 0;
  SUBJECTS.forEach(subject => {
    subject.chapters.forEach(ch => {
      if (subject.comingSoon || !ch.file) return;
      totalCh++;
      const raw = localStorage.getItem(ch.file.replace('.html','') + '_progress');
      const bar = document.getElementById('bar-' + subject.id + '-' + ch.id);
      const pct = document.getElementById('pct-' + subject.id + '-' + ch.id);
      const card = document.querySelector(`a[data-storage-key="${ch.file.replace('.html','')}"]`);
      if (raw && bar && pct) {
        try {
          const data = JSON.parse(raw);
          const p = Math.min(100, Math.round(data.pct || 0));
          bar.style.width = p + '%';
          pct.textContent = p + '%';
          totalPct += p;
          if (p >= 100) { doneCh++; if (card) card.classList.add('complete'); }
        } catch(e) {}
      }
    });
  });
  const overall = totalCh > 0 ? Math.round(totalPct / totalCh) : 0;
  document.getElementById('overallBar').style.width = overall + '%';
  document.getElementById('overallText').textContent = overall + '% klart · ' + doneCh + ' av ' + totalCh + ' kapitel klara';
}

function resetAll() {
  if (!confirm('Nollställa ALL progress för alla ämnen?')) return;
  SUBJECTS.forEach(s => s.chapters.forEach(ch => {
    if (ch.file) localStorage.removeItem(ch.file.replace('.html','') + '_progress');
  }));
  buildGrids();
  loadAllProgress();
}

buildUI();
window.addEventListener('focus', loadAllProgress);
</script>
</body>
</html>
